<!DOCTYPE html>
<html>
<head>
    <title>Doctors</title>
</head>
<body>

<h1>👨‍⚕️ Our Doctors</h1>
<hr>

<table border="1" cellpadding="10">
    <tr>
        <th>Doctor Name</th>
        <th>Specialization</th>
    </tr>

    {% for doctor in doctors %}
    <tr>
        <td>{{ doctor.name }}</td>
        <td>{{ doctor.specialization }}</td>
    </tr>
    {% endfor %}

</table>

<br>

<a href="/">🏠 Home</a>

</body>
</html>
